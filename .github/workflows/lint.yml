name: lint

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  # Manual trigger.
  workflow_dispatch:

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    # Ruff is fast and platform-agnostic; running it on Linux + Mac
    # catches whitespace / line-ending issues that would otherwise
    # only surface on a Windows dev machine.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install ruff
        # ``ruff`` is a fast Rust linter; install it via pip rather
        # than the standalone binary so the CI run is self-contained.
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: ruff check
        # --output-format=github annotates the PR with the lint
        # errors inline, so reviewers see issues without leaving
        # the diff view.
        run: ruff check quant_lib/ tests/ --output-format=github

      - name: ruff format check
        # Verifies the codebase matches the ruff-format style without
        # rewriting. Use ``ruff format`` locally to apply fixes.
        run: ruff format --check quant_lib/ tests/

  mypy:
    name: mypy (Python ${{ matrix.python-version }})
    # mypy is slower than ruff and platform-independent for our
    # purposes; we only run on Linux. If this becomes a bottleneck
    # we can move it to a self-hosted runner.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        # We type-check against the minimum supported Python to
        # catch ``from __future__ import annotations`` issues.

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + mypy
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install mypy

      - name: mypy
        # --ignore-missing-imports: third-party libs without stubs
        # (e.g. Optuna, Rich) shouldn't fail the type-check.
        # --no-strict-optional: Optional[T] vs T is intentional in
        # some places and strict mode is too pedantic.
        run: |
          mypy --ignore-missing-imports --no-strict-optional quant_lib/

  # Lightweight pre-merge gate: the two jobs above are comprehensive
  # but slow. The ``quick`` job runs only ruff check on Linux with
  # the latest Python so the "PR opened" feedback is fast (<30s).
  quick:
    name: quick lint gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install + lint
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check quant_lib/ tests/
