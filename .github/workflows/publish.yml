name: publish

on:
  release:
    types: [published]
  # Manual trigger for bleeding-edge pre-releases (uploads to TestPyPI).
  workflow_dispatch:
    inputs:
      environment:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

# Pypi trusted publishing workflow:
# - On release creation: build + upload to PyPI (requires a trusted
#   publisher configured at https://pypi.org/manage/account/publishing/)
# - On manual dispatch: upload to whatever environment the user selects
#   (requires the corresponding trusted publisher configured there).
#
# There is no concurrency guard because publishing is inherently
# idempotent (a version can only be uploaded once; retries fail with
# a 400).

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build
        run: python -m pip install --upgrade pip build wheel

      - name: Build
        run: python -m build --sdist --wheel --outdir dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish-to-pypi:
    name: upload to PyPI
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [build]
    runs-on: ubuntu-latest
    # Trusted publishing via OIDC: the environment must be configured
    # as a trusted publisher at pypi.org. No PYPI_TOKEN / TWINE_PASSWORD
    # needed.
    environment:
      name: pypi
      url: https://pypi.org/p/quant_lib
    permissions:
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: upload to TestPyPI (manual dispatch only)
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'testpypi'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/quant_lib
    permissions:
      id-token: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
