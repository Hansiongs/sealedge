site_name: sealedge
site_description: Honest backtesting for crypto quantitative strategies
site_url: https://hansiongs.github.io/hans-backtest
repo_url: https://github.com/Hansiongs/sealedge
repo_name: Hansiongs/sealedge
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.path
    - content.code.copy

nav:
  - Home: index.md
  - Methodology: methodology.md
  - Testing: testing.md
  - Contributing: contributing_source.md
  - API Reference:
      - quant_lib: api/quant_lib.md
      - core: api/core.md
      - research: api/research.md
      - audit: api/audit.md
      - tools: api/tools.md
  - Releasing: releasing.md
  - Changelog: changelog_source.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            docstring_style: numpy
            merge_init_into_class: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hansiongs/sealedge

copyright: Copyright © 2026 Hansen Winarto
